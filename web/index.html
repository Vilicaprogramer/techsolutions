<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TechSolutions S.L. - Portal Interno</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo { font-size: 3rem; margin-bottom: 10px; }
        h1 { color: #e94560; font-size: 2rem; }
        h2 { color: #a8a8b3; font-size: 1.1rem; font-weight: normal; margin: 10px 0 30px; }
        .card {
            background: #16213e;
            border: 1px solid #e9456030;
            border-radius: 10px;
            padding: 30px 40px;
            text-align: center;
            max-width: 500px;
        }
        .badge {
            display: inline-block;
            background: #0f3460;
            color: #4ecca3;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        .links { margin-top: 25px; }
        .links a {
            display: inline-block;
            margin: 5px;
            padding: 10px 20px;
            background: #e94560;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        .links a:hover { background: #c73652; }
        .footer {
            margin-top: 30px;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🏢</div>
        <h1>TechSolutions S.L.</h1>
        <h2>Portal de Gestión de Proyectos</h2>
        <p>Bienvenido al sistema interno corporativo.<br>
        Acceso restringido a empleados autorizados.</p>
        <div class="badge">✅ Servidor operativo</div>
        <div class="links">
            <a href="/admin/">🔒 Panel de Administración</a>
        </div>
    </div>
    <div class="footer">
        TechSolutions S.L. © 2025 — Todos los derechos reservados
    </div>
</body>
</html>
