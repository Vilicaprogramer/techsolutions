<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TechSolutions - Panel de Administración</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #16213e;
            border: 1px solid #e9456030;
            border-radius: 10px;
            padding: 30px 40px;
            text-align: center;
            max-width: 500px;
        }
        .logo { font-size: 3rem; margin-bottom: 10px; }
        h1 { color: #e94560; font-size: 1.8rem; }
        h2 { color: #a8a8b3; font-size: 1rem; font-weight: normal; margin: 10px 0 20px; }
        .badge {
            display: inline-block;
            background: #0f3460;
            color: #4ecca3;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        .warning {
            background: #2a1a1a;
            border: 1px solid #e94560;
            border-radius: 5px;
            padding: 10px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔒</div>
        <h1>Panel de Administración</h1>
        <h2>Zona restringida — Solo administradores</h2>
        <p>Has accedido correctamente al panel interno.<br>
        Esta área contiene información sensible de la empresa.</p>
        <div class="badge">🛡️ Acceso autenticado correctamente</div>
        <div class="warning">
            ⚠️ Todas las acciones quedan registradas en los logs del servidor.
        </div>
    </div>
</body>
</html>
