# ============================================
# VIRTUALHOST HTTPS - TECHSOLUTIONS S.L.
# ============================================
<VirtualHost *:443>
    ServerName techsolutions.local
    DocumentRoot /var/www/techsolutions

    # === SSL/TLS ===
    SSLEngine on
    SSLCertificateFile    /etc/apache2/ssl/techsolutions.crt
    SSLCertificateKeyFile /etc/apache2/ssl/techsolutions.key

    # Solo protocolos seguros (TLS 1.2 y 1.3)
    SSLProtocol -all +TLSv1.2 +TLSv1.3

    # === PERMISOS DE LA WEB ===
    <Directory /var/www/techsolutions>
        # Desactivar listado de archivos (seguridad)
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # === ZONA RESTRINGIDA /admin ===
    <Directory /var/www/techsolutions/admin>
        AuthType Basic
        AuthName "Zona Restringida - TechSolutions S.L."
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user

        # Doble seguridad: autenticación Y origen
        Options -Indexes
    </Directory>

    # === CABECERAS DE SEGURIDAD ===
    # Evitar que la web se cargue en el iframe (clickjacking)
    Header always set X-Frame-Options "SAMEORIGIN"

    # Evitar que el navegador adivine el tipo de archivo
    Header always set X-Content-Type-Options "nosniff"

    # Forzar HTTPS en futuros accesos
    Header always set Strict-Transport-Security "max-age=31536000"

    ErrorLog  ${APACHE_LOG_DIR}/techsolutions_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/techsolutions_ssl_access.log combined
</VirtualHost>